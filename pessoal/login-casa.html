<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despesas da Casa · Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#7c3aed;--dark:#1a1a2e;--card:#241f3d;--border:#3d3560;--text:#f1f5f9;--muted:#94a3b8;--input:#1a1a2e}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:380px;padding:24px;}
.logo{text-align:center;margin-bottom:32px;font-size:32px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px;}
h2{font-size:18px;font-weight:700;margin-bottom:6px;}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:28px;}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
input{width:100%;background:var(--input);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;transition:.15s;}
input:focus{border-color:var(--purple);}
.field{margin-bottom:18px;}
.btn{width:100%;background:var(--purple);color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;margin-top:8px;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.error{background:#450a0a;border:1px solid #7f1d1d;border-radius:8px;padding:12px 14px;font-size:13px;color:#fca5a5;margin-bottom:18px;display:none;}
.footer{text-align:center;color:var(--muted);font-size:12px;margin-top:28px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">💰</div>
  <div class="card">
    <h2>Despesas da Casa</h2>
    <p class="subtitle">Login da familia. Use seu nome de usuario e senha.</p>
    <div class="error" id="err">Usuario ou senha incorretos.</div>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="user" placeholder="felipe ou leticia" autocomplete="username">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="pwd" placeholder="········" autocomplete="current-password">
    </div>
    <button class="btn" id="btn" onclick="doLogin()">Entrar</button>
  </div>
  <p class="footer">Despesas da Casa · Felipe & Leticia</p>
</div>
<script>
var USERS = {
  'felipe':{hash:'9f98ff9af7044a446a74bc5554ec042606b878920e5820f8571b8ac5876f7879', nome:'Felipe'},
  'leticia':{hash:'ce909c88ffc3089025057091542080293027ba54929f7aa9262fa18d7387e4ae', nome:'Leticia'}
};

document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('user').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('pwd').focus();});

async function sha256(str){
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

async function doLogin(){
  var user=document.getElementById('user').value.trim().toLowerCase();
  var pwd=document.getElementById('pwd').value;
  var btn=document.getElementById('btn');
  var err=document.getElementById('err');
  err.style.display='none';
  btn.disabled=true;
  btn.textContent='Verificando...';
  try{
    var hash=await sha256(pwd);
    var u=USERS[user];
    if(u&&u.hash===hash){
      var session={user:user, nome:u.nome, ts:Date.now(), token:btoa(user+':casa2026:'+Date.now())};
      sessionStorage.setItem('despesas_casa_session',JSON.stringify(session));
      var next=new URLSearchParams(location.search).get('next')||'despesas.html';
      location.href=next;
    }else{
      err.style.display='block';
      btn.disabled=false;
      btn.textContent='Entrar';
    }
  }catch(ex){
    err.style.display='block';
    btn.disabled=false;
    btn.textContent='Entrar';
  }
}
</script>
</body>
</html>
